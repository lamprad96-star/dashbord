<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강남 3구 등록인구 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--sf:#161b22;--sf2:#1c2128;--bd:#30363d;--amber:#f59e0b;--blue:#3b82f6;--green:#10b981;--pink:#ec4899;--text:#e6edf3;--muted:#7d8590;--up:#10b981;--down:#ef4444;--seocho:#10b981;--gangnam:#f59e0b;--songpa:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.header h1{font-size:22px;font-weight:700}.header h1 span{color:var(--amber)}
.header p{font-size:12px;color:var(--muted);margin-top:2px}
.back-btn{display:none;background:var(--sf2);border:1px solid var(--bd);color:var(--muted);padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;align-items:center;gap:6px}
.back-btn:hover{border-color:var(--text);color:var(--text)}.back-btn.show{display:inline-flex}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.breadcrumb .bc-link{color:var(--amber);cursor:pointer;font-weight:600}.breadcrumb .bc-link:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:var(--bd)}.breadcrumb .bc-current{color:var(--text);font-weight:700}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all .25s}
.kpi:hover{border-color:var(--muted);transform:translateY(-1px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.kpi-meta{font-size:11px;display:flex;align-items:center;gap:6px}
.badge{padding:2px 7px;border-radius:12px;font-weight:700;font-size:10px}
.badge.up{background:rgba(16,185,129,.15);color:var(--up)}.badge.down{background:rgba(239,68,68,.15);color:var(--down)}
.kpi-sub{color:var(--muted)}
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.map-panel{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px;position:relative;min-height:460px}
.info-panel{display:flex;flex-direction:column;gap:12px}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px 18px}
.panel-title{font-size:13px;font-weight:700;margin-bottom:3px}.panel-sub{font-size:11px;color:var(--muted);margin-bottom:12px}
.map-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.map-container svg{width:100%;height:auto;max-height:430px}
.district-path,.dong-path{cursor:pointer;transition:all .25s;stroke:#30363d;stroke-width:1.5}
.district-path:hover,.dong-path:hover{filter:brightness(1.35);stroke:var(--text);stroke-width:2}
.map-label{font-size:14px;font-weight:700;fill:var(--text);pointer-events:none;text-anchor:middle;dominant-baseline:central}
.map-sublabel{font-size:10px;fill:var(--muted);pointer-events:none;text-anchor:middle;dominant-baseline:central;font-weight:600}
.map-val{font-size:12px;fill:var(--text);pointer-events:none;text-anchor:middle;dominant-baseline:central;font-weight:800}
.dong-label{font-size:9px;font-weight:600;fill:var(--text);pointer-events:none;text-anchor:middle;dominant-baseline:central}
.dong-val{font-size:7.5px;fill:var(--muted);pointer-events:none;text-anchor:middle;dominant-baseline:central;font-weight:700}
.mini-table{width:100%;border-collapse:collapse;font-size:11px}
.mini-table th{color:var(--muted);font-weight:600;text-align:center;padding:5px 3px;border-bottom:1px solid var(--bd);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.mini-table td{padding:6px 3px;border-bottom:1px solid rgba(48,54,61,.5);text-align:center;transition:all .2s}
.mini-table tr:last-child td{border-bottom:none}
.mini-table tbody tr{cursor:pointer;transition:background .15s}.mini-table tbody tr:hover{background:rgba(245,158,11,.06)}
.mini-table tr.active-row{background:rgba(245,158,11,.12)}
.num{font-weight:700}.up-c{color:var(--up);font-weight:600}.down-c{color:var(--down);font-weight:600}
.chart-wrap{height:190px;margin-top:6px}
.tooltip{position:absolute;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;min-width:160px}
.tooltip.show{opacity:1}
.tooltip .tt-name{font-weight:700;font-size:13px;margin-bottom:4px}.tooltip .tt-val{font-weight:800;font-size:16px}.tooltip .tt-sub{color:var(--muted);font-size:10px;margin-top:2px}
.fade{animation:fadeIn .35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.table-scroll{max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.table-scroll::-webkit-scrollbar{width:4px}.table-scroll::-webkit-scrollbar-track{background:transparent}.table-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.footer{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;padding-top:14px;border-top:1px solid var(--bd)}
</style>
</head>

  </div>
</div>
<div class="footer">출처: 서울특별시 기본통계 — 등록인구 전년동분기 대비 증감, 4분기 기준 (2021~2025)</div>

function fmt(n){if(n===null||n===undefined)return '—';return n.toLocaleString('ko-KR')}
function chgStr(n){if(n===null||n===undefined)return '—';const s=n>=0?'+':'';return`<span class="${n>=0?'up-c':'down-c'}">${s}${fmt(n)}</span>`}
function pctChg(c,p){if(!p||!c)return '—';const r=(c-p)/p*100;return`<span class="${r>=0?'up-c':'down-c'}">${r>=0?'+':''}${r.toFixed(1)}%</span>`}

      <div class="kpi-meta">${badgeHtml(top.chg[4])}<span class="kpi-sub">${fmt(top.pop[4])}명</span></div></div>
    <div class="kpi"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--down)"></div>
      <div class="kpi-label">최대 감소 행정동</div><div class="kpi-value" style="color:var(--down);font-size:18px">${bottom.name}</div>
      <div class="kpi-meta">${badgeHtml(bottom.chg[4])}<span class="kpi-sub">${fmt(bottom.pop[4])}명</span></div></div>
    <div class="kpi"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--pink)"></div>
      <div class="kpi-label">최다 인구 행정동</div><div class="kpi-value" style="color:var(--pink);font-size:18px">${biggest.name}</div>
      <div class="kpi-meta"><span class="kpi-sub">${fmt(biggest.pop[4])}명</span></div></div>`;
}

// ══ MAP ══
function mainMap(){
  return`<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <path class="district-path" d="M 40,60 L 180,40 L 220,80 L 240,160 L 230,260 L 200,320 L 120,340 L 50,280 L 30,180 Z"
      fill="${CL.seocho}0.25)" onmouseenter="ttShow(evt,'seocho')" onmouseleave="ttHide()" onclick="drillDown('seocho')"/>
    <text class="map-label" x="140" y="155">서초구</text>
    <text class="map-val" x="140" y="178" fill="${C.seocho}">${fmt(DATA.seocho.total[4])}</text>
    <text class="map-sublabel" x="140" y="198">${DATA.seocho.chg[4]>=0?'+':''}${fmt(DATA.seocho.chg[4])}</text>
    <path class="district-path" d="M 220,80 L 370,50 L 420,100 L 430,200 L 410,290 L 340,330 L 230,260 L 240,160 Z"
      fill="${CL.gangnam}0.25)" onmouseenter="ttShow(evt,'gangnam')" onmouseleave="ttHide()" onclick="drillDown('gangnam')"/>
    <text class="map-label" x="330" y="160">강남구</text>
    <text class="map-val" x="330" y="183" fill="${C.gangnam}">${fmt(DATA.gangnam.total[4])}</text>
    <text class="map-sublabel" x="330" y="203">${DATA.gangnam.chg[4]>=0?'+':''}${fmt(DATA.gangnam.chg[4])}</text>
    <path class="district-path" d="M 420,100 L 560,70 L 580,160 L 570,280 L 500,340 L 410,290 L 430,200 Z"
      fill="${CL.songpa}0.25)" onmouseenter="ttShow(evt,'songpa')" onmouseleave="ttHide()" onclick="drillDown('songpa')"/>
    <text class="map-label" x="500" y="165">송파구</text>
    <text class="map-val" x="500" y="188" fill="${C.songpa}">${fmt(DATA.songpa.total[4])}</text>
    <text class="map-sublabel" x="500" y="208">${DATA.songpa.chg[4]>=0?'+':''}${fmt(DATA.songpa.chg[4])}</text>
  </svg>`;
}

function dongMap(key){
  const d=DATA[key];const dongs=d.dongs.filter(x=>x.pop[4]!==null);
  const cols=Math.ceil(Math.sqrt(dongs.length));const rows=Math.ceil(dongs.length/cols);
  const cW=560/cols,cH=370/rows,pad=3;
  const pops=dongs.map(x=>x.pop[4]);const mn=Math.min(...pops),mx=Math.max(...pops);
  let paths='';
  dongs.forEach((dong,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const x=20+col*cW+pad,y=15+row*cH+pad,w=cW-pad*2,h=cH-pad*2;
    const intensity=mx>mn?0.15+0.45*((dong.pop[4]-mn)/(mx-mn)):0.3;
    paths+=`<rect class="dong-path" x="${x}" y="${y}" width="${w}" height="${h}" rx="5"
      fill="${d.cl}${intensity})" data-dong="${i}" data-key="${key}"
      onmouseenter="ttDong(evt,'${key}',${i})" onmouseleave="ttHide()" onclick="selectDong('${key}',${i})"/>
    <text class="dong-label" x="${x+w/2}" y="${y+h/2-6}">${dong.name}</text>
    <text class="dong-val" x="${x+w/2}" y="${y+h/2+7}">${fmt(dong.pop[4])}</text>`;
  });
  return`<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}

// ══ TOOLTIP ══
function ttShow(evt,key){
  const d=DATA[key];const tt=document.getElementById('tooltip');
  tt.innerHTML=`<div class="tt-name" style="color:${d.color}">${d.name}</div>
    <div class="tt-val" style="color:${d.color}">${fmt(d.total[4])}명</div>
    <div class="tt-sub">전년 대비 ${d.chg[4]>=0?'+':''}${fmt(d.chg[4])}</div>
    <div class="tt-sub" style="margin-top:4px">클릭 → 행정동 상세 →</div>`;
  tt.classList.add('show');
}
function ttDong(evt,key,i){
  const d=DATA[key],dong=d.dongs[i];const tt=document.getElementById('tooltip');
  tt.innerHTML=`<div class="tt-name" style="color:${d.color}">${dong.name}</div>
    <div class="tt-val" style="color:${d.color}">${fmt(dong.pop[4])}명</div>
    <div class="tt-sub">전년 대비 ${dong.chg[4]!==null?((dong.chg[4]>=0?'+':'')+fmt(dong.chg[4])):'—'}</div>`;
  tt.classList.add('show');
}
function ttHide(){document.getElementById('tooltip').classList.remove('show')}

document.getElementById('mapPanel').addEventListener('mousemove',e=>{
  const tt=document.getElementById('tooltip');if(!tt.classList.contains('show'))return;
  const r=document.getElementById('mapPanel').getBoundingClientRect();
  let l=e.clientX-r.left+14,t=e.clientY-r.top-10;
  if(l+170>r.width)l-=180;if(t+80>r.height)t-=80;
  tt.style.left=l+'px';tt.style.top=t+'px';
});

// ══ TABLE ══
function mainTable(){
  const rows=Object.entries(DATA).map(([k,d])=>{
    const r=d.total;
    return`<tr onclick="drillDown('${k}')">
      <td class="num" style="color:${d.color}">${d.name}</td>
      ${YEARS.map((y,i)=>`<td class="num">${fmt(r[i])}</td>`).join('')}
      <td>${chgStr(d.chg[4])}</td><td>${pctChg(r[4],r[0])}</td></tr>`;
  }).join('');
  document.getElementById('dataTable').innerHTML=`<table class="mini-table"><thead>
    <tr><th>구</th>${YEARS.map(y=>`<th>'${y.slice(2)}</th>`).join('')}<th>증감</th><th>5년변화</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('tableTitle').textContent='구별 등록인구';
  document.getElementById('tableSub').textContent='구를 클릭하면 행정동 상세로 이동';
}

function dongTable(key){
  const d=DATA[key];
  const rows=d.dongs.map((dong,i)=>{
    return`<tr onclick="selectDong('${key}',${i})" data-dongidx="${i}">
      <td class="num" style="text-align:left;padding-left:6px">${dong.name}</td>
      ${YEARS.map((y,j)=>`<td class="num">${fmt(dong.pop[j])}</td>`).join('')}
      <td>${chgStr(dong.chg[4])}</td><td>${pctChg(dong.pop[4],dong.pop[0])}</td></tr>`;
  }).join('');
  document.getElementById('dataTable').innerHTML=`<table class="mini-table"><thead>
    <tr><th>행정동</th>${YEARS.map(y=>`<th>'${y.slice(2)}</th>`).join('')}<th>증감</th><th>5년변화</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('tableTitle').textContent=d.name+' 행정동별 등록인구';
  document.getElementById('tableSub').textContent=`${d.dongs.length}개 행정동 — 행을 클릭하면 지도에서 하이라이트`;
}

// ══ CHART ══
function mainChart(){
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{labels:YEARS,datasets:Object.entries(DATA).map(([k,d])=>({
      label:d.name,data:d.total,borderColor:d.color,backgroundColor:d.cl+'0.1)',
      fill:false,tension:0.3,pointRadius:4,borderWidth:2.5
    }))},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
      plugins:{legend:{position:'top',labels:{boxWidth:10,padding:10}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)+'명'}}},
      scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(48,54,61,0.8)'},ticks:{callback:v=>(v/10000).toFixed(0)+'만'}}}
    }
  });
  document.getElementById('chartTitle').textContent='3구 인구 추이';
  document.getElementById('chartSub').textContent='2021–2025 4분기';
}

function dongChart(key){
  if(trendChart)trendChart.destroy();
  const d=DATA[key];
  const sorted=[...d.dongs].filter(x=>x.pop[4]!==null).sort((a,b)=>b.pop[4]-a.pop[4]).slice(0,6);
  const palette=['#f59e0b','#3b82f6','#10b981','#ec4899','#8b5cf6','#06b6d4'];
  trendChart=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{labels:YEARS,datasets:sorted.map((dong,i)=>({
      label:dong.name,data:dong.pop,borderColor:palette[i],
      fill:false,tension:0.3,pointRadius:3,borderWidth:2
    }))},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
      plugins:{legend:{position:'top',labels:{boxWidth:8,padding:6,font:{size:10}}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)+'명'}}},
      scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(48,54,61,0.8)'},ticks:{callback:v=>(v/10000).toFixed(1)+'만'}}}
    }
  });
  document.getElementById('chartTitle').textContent=d.name+' 상위 행정동 추이';
  document.getElementById('chartSub').textContent='인구 상위 6개동';
}

// ══ SELECT DONG ══
function selectDong(key,idx){
  document.querySelectorAll('.dong-path').forEach(p=>{
    const d=DATA[key];const intensity=0.25;
    p.setAttribute('fill',d.cl+intensity+')');
  });
  const el=document.querySelector(`[data-dong="${idx}"]`);
  if(el)el.setAttribute('fill',DATA[key].cl+'0.7)');
  document.querySelectorAll('.mini-table tbody tr').forEach(r=>r.classList.remove('active-row'));
  const tr=document.querySelector(`tr[data-dongidx="${idx}"]`);
  if(tr){tr.classList.add('active-row');tr.scrollIntoView({block:'nearest'})}
}

// ══ NAVIGATION ══
function renderMainView(){
  currentView='main';
  document.getElementById('mapContainer').innerHTML=mainMap();
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('breadcrumb').innerHTML='<span class="bc-current">강남 3구 전체</span>';
  renderMainKPIs();mainTable();mainChart();
  anim();
}
function drillDown(key){
  currentView=key;const d=DATA[key];
  document.getElementById('mapContainer').innerHTML=dongMap(key);
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('breadcrumb').innerHTML=`<span class="bc-link" onclick="goBack()">강남 3구</span><span class="bc-sep">›</span><span class="bc-current" style="color:${d.color}">${d.name} (${d.dongs.length}개동)</span>`;
  renderDongKPIs(key);dongTable(key);dongChart(key);
  anim();
}
function goBack(){renderMainView()}
function anim(){
  ['mapContainer','infoPanel','kpiRow'].forEach(id=>{
    document.getElementById(id).classList.add('fade');
    setTimeout(()=>document.getElementById(id).classList.remove('fade'),350);
  });
}

renderMainView();
</script>
